<!DOCTYPE html>
<html lang="en"> <!--setting the language-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- setting the viewport width -->
    <title>Web Desk</title> <!-- title  -->
	<meta name="author" content="Bradley Larkin"><!-- Gives credit to the author -->
	<link rel="author" href="https://github.com/UnavoidableArrowgance">
	<link rel="license" href="https://creativecommons.org/licenses/by/4.0/">
    <link rel="shortcut icon" href="images/favicon.ico?" type="image/x-icon">
    <link rel="icon" href="images/favicon.ico?" type="image/x-icon">

    <link rel="stylesheet" href="styles.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

    <script src="script.js" defer></script>

</head>

<body>
    <h1  class="visually-hidden">Web Desk Dashboard</h1>
    <header id="topBar">
        <!-- writing a banner with a nav that resembles tabs themselves -->
        <div id="siteTitle"> 
            <span class="title">Web Desk</span>
        </div>
        <nav id="navigation">
            <ul>
                <li><a href = "index.html" class="active">Dashboard</a></li>
                <li><a href = "summary.html">Summary</a></li>
                <li><a href = "about.html">About</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div id="fullDashboard" class="dashboard-normal">

            <!-- Left sidebar buttons -->
            <aside id="dashboardSidebar">
                <div id="backgroundColorTool">

                    <button id="bgColorButton">
                        Background
                        <span id="colorPreview"></span>
                    </button>

                    <input type="color" id="bgColor">

                </div>
                <button id="toggleMode">Switch to Active</button>
                <div id="modeDisplay">Mode: Edit</div>
                <button id="addIcon">Add an Icon</button>
                <button id="deleteTool">Delete Tool</button>
                <button id="load">Load</button>
                <button id="save">Save</button>
                <button id="clearBoard">Clear Board</button>
            </aside>


            <div id="iconModalOverlay" class="hidden overlay">
                <section id="iconModal" class="modal" aria-labelledby="iconModalTitle" aria-modal="true" role="dialog">

                    <h2 id="iconModalTitle">Create Icon</h2>

                    <!-- top: mode switch -->
                    <div id="iconTypeSwitch">
                        <label>
                            <input type="radio" name="iconType" value="shape" checked>
                            Shape Icon
                        </label>

                        <label>
                            <input type="radio" name="iconType" value="image">
                            Image Upload
                        </label>
                    </div>

                    <!-- middle: preview + changing controls -->
                    <div id="iconBuilder">

                        <!-- live preview -->
                        <div id="iconPreviewPanel">
                            <div id="iconPreviewBox">
                                <div id="iconPreviewShape" class="iconShape square"></div>
                                <img id="iconPreviewImage" class="hidden" alt="Icon preview">
                            </div>
                        </div>

                        <!-- shape controls -->
                        <div id="shapeControls">
                            <label for="shapeSelect">Shape</label>
                            <select id="shapeSelect">
                                <option value="circle">Circle</option>
                                <option value="triangle-up">Triangle Up</option>
                                <option value="triangle-down">Triangle Down</option>
                                <option value="triangle-left">Triangle Left</option>
                                <option value="triangle-right">Triangle Right</option>
                                <option value="square">Square</option>
                                <option value="diamond">Diamond</option>
                                <option value="rectangle">Rectangle</option>
                                <option value="oval">Oval</option>
                                <option value="star">5pt Star</option>
                                <option value="hexagon">Hexagon</option>
                                <option value="plus">Plus</option>
                                <option value="x">X</option>
                            </select>

                            <label for="shapeColor">Shape Color</label>
                            <div class="colorPickerRow">
                                <button type="button" id="shapeColorButton">Choose Color</button>
                                <span id="shapeColorPreview" class="colorPreview"></span>
                                <input type="color" id="shapeColor" value="#34c759">
                            </div>
                        </div>

                        <!-- image controls -->
                        <div id="imageControls" class="hidden">
                            <label for="iconImageUpload">Upload Image</label>
                            <input type="file" id="iconImageUpload" accept="image/*">

                            <p id="uploadHelp">Converts to 32 x 32 image</p>
                        </div>

                        <!-- bottom: shared fields -->
                        <div id="iconSharedFields">
                            <label for="iconLabel">Display Label under Icon</label>
                            <input type="text" id="iconLabel" placeholder="Label">

                            <label for="textColor">Text Color</label>
                            <div class="colorPickerRow">
                                <button type="button" id="textColorButton">Choose Color</button>
                                <span id="textColorPreview" class="colorPreview"></span>
                                <input type="color" id="textColor" value="#000000">
                            </div>

                            <label for="iconLinkInput">Link to external website</label>
                            <input type="url" id="iconLinkInput" placeholder="Link">
                        </div>

                        <!-- actions -->
                        <div id="iconModalActions">
                            <button type="button" id="cancelIconCreate">Cancel</button>
                            <button type="button" id="createIconConfirm">Create Icon</button>
                        </div>

                </section>
            </div>

            
            <section id="dashboard">
            
            </section>

            <div id="fullScreenControls" class="overDashboard">
                <button id="fullscreenBtn" class="windowed">Fullscreen</button>
            </div>

            <div id="externalButtons" class="overTopBar">
                <button id="exportButton" class="external">Export</button>
                <button id="importButton" class="external">Import</button>
            </div>
            <div id="storageModalOverlay" class="hidden overlay">
                <section id="storageModal" class="modal">
                    <h2 id="storageModalTitle">Export Layout</h2>
                    <textarea id="storageTextArea"></textarea>
                    <div id="storageModalActions">
                        <button id="storageCancel">Cancel</button>
                        <button id="storageAction">Copy</button>
                    </div>
                </section>
            </div>

        </div>
    </main>
</body>
