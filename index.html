<!DOCTYPE html>
<html lang="en"> <!--setting the language-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280"> <!-- setting the viewport width -->
    <title>Web Desk</title> <!-- title  -->
	<meta name="author" content="Bradley Larkin"><!-- Gives credit to the author -->
	<link rel="author" href="https://github.com/UnavoidableArrowgance">
	<link rel="license" href="https://creativecommons.org/licenses/by/4.0/">
    <link rel="shortcut icon" href="images/favicon.ico?" type="image/x-icon">
    <link rel="icon" href="images/favicon.ico?" type="image/x-icon">

    <link rel="stylesheet" href="styles.css"> <!-- linking the style sheet -->
    <script src="script.js" defer></script> <!--linking the javascript-->

    <!-- jQuery core -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- jQuery UI (correct version) -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

</head>

<body>
    <h1  class="visually-hidden">Web Desk Dashboard</h1>
    <header id="topBar">
        <!-- writing a banner with a nav that resembles tabs themselves -->
        <div id="siteTitle"> 
            <span class="title">Web Desk</span>
        </div>
        <nav id="navigation">
            <ul>
                <li><a href = "index.html" class="active">Dashboard</a></li>
                <li><a href = "summary.html">Summary</a></li>
                <li><a href = "about.html">About</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div id="fullDashboard" class="dashboard-normal">

            <!-- Left sidebar buttons -->
            <aside id="dashboardSidebar">
                <div id="backgroundColorTool">

                    <button id="bgColorButton">
                        Background
                        <span id="colorPreview"></span>
                    </button>

                    <input type="color" id="bgColor">

                </div>
                <button id="addIcon">Add an Icon</button>
                <button id="trashCanBol">Trash Can</button>
                <button id="editMode">Edit Mode</button>
                <button id="activeMode">Active Mode</button>
                <button id="load">Load</button>
                <button id="save">Save</button>
                <button id="clearBoard">Clear Board</button>
            </aside>

            <section id="dashboard">
            
            </section>

            <div id="fullScreenControls" class="overDashboard">
                <button id="fullscreenBtn" class="windowed">Fullscreen</button>
            </div>

            <!-- Trash Can overlay -->
            <div id="trashCan" class="overDashboard">
                <img src="images/trash.png" alt="Trash Can">
            </div>
        </div>
    </main>
</body>
